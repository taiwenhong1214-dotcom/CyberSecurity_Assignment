<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cryptographic System - Assignment 1</title>
    
    <!-- ==========================================
         SECTION 1: UI DESIGN & STYLING (CSS)
         ========================================== -->
    <style>
        :root {
            --primary: #e6e9ef;
            --accent: #36cdf3;
            --accent-hover: #2759e1;
            --danger: #dc2699;
            --danger-hover: #c81d89;
            --success: #1ca7ae;
            --bg: #09223a;
            --surface: #09110c;
            --border: #4ac9ff;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--primary);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .main-wrapper {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
            max-width: 1200px;
            width: 100%;
        }
        .container {
            background-color: var(--surface);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            border: 1px solid var(--border);
            align-self: start;
        }
        h2, h3 { margin-top: 0; font-weight: 700; color: var(--primary); text-transform: uppercase;}
        h2 { text-align: center; margin-bottom: 5px; }
        p.subtitle { text-align: center; color: #dadadb; margin-bottom: 25px; font-size: 0.9em; }
        
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.95em; }
        textarea, select, input {
            width: 100%; padding: 12px; border: 2px solid var(--border);
            border-radius: 8px; box-sizing: border-box; font-family: inherit;
            font-size: 14px; transition: 0.3s ease;
        }
        textarea:focus, select:focus, input:focus { outline: none; border-color: var(--accent); }
        textarea { resize: vertical; height: 100px; }
        input { }
        
        .btn-group { display: flex; gap: 15px; margin-top: 20px; }
        button {
            flex: 1; padding: 14px; border: none; border-radius: 8px;
            font-size: 15px; font-weight: 600; cursor: pointer; color: white;
            transition: all 0.3s ease;
        }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        #btn-encrypt { background-color: var(--accent); }
        #btn-encrypt:hover:not(:disabled) { background-color: var(--accent-hover); transform: translateY(-2px); box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3); }
        #btn-decrypt { background-color: var(--danger); }
        #btn-decrypt:hover:not(:disabled) { background-color: var(--danger-hover); transform: translateY(-2px); box-shadow: 0 4px 12px rgba(220, 38, 38, 0.3); }
        #btn-copy { background-color: var(--success); margin-top: 10px; width: 100%; }
        #btn-copy:hover { opacity: 0.9; box-shadow: 0 4px 12px rgba(22, 163, 74, 0.3); }
        .error-msg { color: var(--danger); font-size: 0.85em; margin-top: 5px; display: none; font-weight: bold;}
        
        /* ==========================================
           BEAUTIFUL CONSOLE STYLING
           ========================================== */
        .console-wrapper {
            background-color: #030712;
            border-radius: 12px;
            box-shadow: 0 20px 40px #4ac9ff, 0 0 0 1px #4ac9ff;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 520px;
        }
        /* Top Window Bar */
        .console-header {
            background-color: #111827;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .dot { height: 12px; width: 12px; border-radius: 50%; }
        .dot.red { background-color: #ff5f56; box-shadow: 0 0 6px rgba(255, 95, 86, 0.5); }
        .dot.yellow { background-color: #ffbd2e; box-shadow: 0 0 6px rgba(255, 189, 46, 0.5); }
        .dot.green { background-color: #27c93f; box-shadow: 0 0 6px rgba(39, 201, 63, 0.5); }
        .console-title {
            color: #e4e9f0; font-family: 'Courier New', monospace; font-size: 13px; margin-left: auto; margin-right: auto;
        }
        
        /* Inner Console Area */
        .step-console {
            background-image: radial-gradient(circle at center, #111827 0%, #030712 100%);
            color: #f4f7fa;
            font-family: 'Courier New', Courier, monospace;
            padding: 20px;
            flex-grow: 1;
            overflow-y: auto;
            font-size: 14px;
            line-height: 1.7;
        }
        
        /* Line Animation (Slide up & Fade In) */
        .step-console div {
            padding: 4px 0;
            border-bottom: 1px dashed rgba(255,255,255,0.05);
            animation: slideFadeIn 0.5s ease-out forwards;
            opacity: 0; 
        }
        @keyframes slideFadeIn {
            0% { opacity: 0; transform: translateY(10px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* Typography Formatting inside Console */
        .prompt { color: #ec4899; font-weight: bold; margin-right: 6px; text-shadow: 0 0 5px rgba(236, 72, 153, 0.5); }
        .highlight { color: #facc15; font-weight: bold; text-shadow: 0 0 8px rgba(250, 204, 21, 0.4); }
        .success { color: #22d3ee; font-weight: bold; text-shadow: 0 0 8px rgba(34, 211, 238, 0.5); }
        .badge {
            background: rgba(37, 99, 235, 0.15);
            border: 1px solid rgba(59, 130, 246, 0.4);
            color: #60a5fa;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 11px;
            letter-spacing: 1px;
        }

        /* Custom Dark Scrollbar */
        .step-console::-webkit-scrollbar { width: 8px; }
        .step-console::-webkit-scrollbar-track { background: #030712; }
        .step-console::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .step-console::-webkit-scrollbar-thumb:hover { background: #475569; }
        
        @media (max-width: 950px) {
            .main-wrapper { grid-template-columns: 1fr; }
            .console-wrapper { height: 380px; margin-top: 20px; }
        }
    </style>
</head>
<body>

<div class="main-wrapper">
    <!-- ==========================================
         LEFT COLUMN: User Inputs & Controls
         ========================================== -->
    <div class="container">
        <h2>Crypto System</h2>
        <p class="subtitle">Encryption/Decryption Tool</p>

        <div class="form-group">
            <label for="inputText">Message (Plaintext):</label>
            <textarea id="inputText" placeholder="ex: RAFA IS THE KING OF CLAY"></textarea>         
        </div>

        <div class="form-group">
            <label for="cipherMethod">Traditional Encryption Algorithm:</label>
            <select id="cipherMethod" onchange="updateUI()">
                <option value="additive">1. Additive Cipher</option>
                <option value="simple">2. Simple Cipher</option>
                <option value="vigenere">3. Vigenère Cipher</option>
                <option value="railfence">4. Rail Fence Cipher</option>
            </select>
        </div>

        <div class="form-group" id="keyGroup">
            <label for="cipherKey">Cryptographic Key:</label>
            <input type="text" id="cipherKey" placeholder="Enter a numerical shift (ex: 8)">
            <div id="keyError" class="error-msg">Invalid key format.</div>
        </div>

        <div class="btn-group">
            <button id="btn-encrypt" onclick="executeProcess('encrypt')">Encrypt Message</button>
            <button id="btn-decrypt" onclick="executeProcess('decrypt')">Decrypt Message</button>
        </div>

        <div class="form-group" style="margin-top: 25px;">
            <label for="outputText">Output Result (Ciphertext):</label>
            <textarea id="outputText" readonly placeholder="Result will appear here..."></textarea>
            <button id="btn-copy" onclick="copyToClipboard()">Copy Result</button>
        </div>
    </div>

    <!-- ==========================================
         RIGHT COLUMN: Beautiful Live Console & GIF
         ========================================== -->
    <div class="right-column" style="display: flex; flex-direction: column; gap: 20px;">
        
        <div class="console-wrapper">
            <!-- MacOS style window header -->
            <div class="console-header">
                <span class="dot red"></span>
                <span class="dot yellow"></span>
                <span class="dot green"></span>
                <span class="console-title">Step-by-step Encryption/Decryption</span>
            </div>
            
            <!-- Text Output Area -->
            <div id="stepConsole" class="step-console">
                <div>
                    <span class="prompt">➜</span> 
                    <span class="success">SYSTEM READY.</span> Select an algorithm and execute.</div>
            </div>
        </div>

        <!-- GIF PLACED OUTSIDE & BELOW THE CONSOLE WINDOW -->
        <div class="gif-container" style="text-align: center;">
            <img src="computer.gif" alt="My Custom Animation" style="max-width: 80%; height: 80%;">
        </div>



    </div>
</div>

<!-- ==========================================
     SECTION 2: JAVASCRIPT SYSTEM LOGIC
     ========================================== -->
<script>
    const delay = ms => new Promise(res => setTimeout(res, ms));

    function updateUI() {
        const method = document.getElementById('cipherMethod').value;
        const keyInput = document.getElementById('cipherKey');
        document.getElementById('keyError').style.display = 'none';

        if (method === 'additive') keyInput.placeholder = 'Enter a numerical shift (ex: 8)';
        else if (method === 'simple') keyInput.placeholder = 'Enter a text keyword (ex: BLUECAT)';
        else if (method === 'vigenere') keyInput.placeholder = 'Enter a text keyword (ex: TENNIS)';
        else if (method === 'railfence') keyInput.placeholder = 'Enter number of row stages (ex: 6)';
    }

    async function executeProcess(action) {
        let originalText = document.getElementById('inputText').value;
        // Preserve all characters
        // We will uppercase letters but keep spaces/punctuation as is
        let text = originalText; // keep original spacing
        
        const method = document.getElementById('cipherMethod').value;
        let key = document.getElementById('cipherKey').value.toUpperCase();
        
        const errorMsg = document.getElementById('keyError');
        const outputBox = document.getElementById('outputText');
        const encryptBtn = document.getElementById('btn-encrypt');
        const decryptBtn = document.getElementById('btn-decrypt');
        
        let resultObj = { output: '', steps: [] };

        if (!text.trim()) return alert("Please enter a valid message to process.");
        errorMsg.style.display = 'none';

        try {
            if (method === 'additive') {
                let shift = parseInt(key);
                if (isNaN(shift)) throw new Error("Additive Cipher requires a numerical key.");
                resultObj = additiveCipher(text, shift, action === 'decrypt');
            } 
            else if (method === 'simple') {
                if (!/^[A-Z]+$/.test(key)) throw new Error("Simple Cipher requires a keyword (letters only).");
                resultObj = simpleCipher(text, key, action === 'decrypt');
            }
            else if (method === 'vigenere') {
                if (!/^[A-Z]+$/.test(key)) throw new Error("Vigenère Cipher requires a keyword (letters only).");
                resultObj = vigenereCipher(text, key, action === 'decrypt');
            } 
            else if (method === 'railfence') {
                let rails = parseInt(key);
                if (isNaN(rails) || rails < 2) throw new Error("Rail Fence requires a row number of 2 or greater.");
                resultObj = action === 'encrypt' ? railFenceEncrypt(text, rails) : railFenceDecrypt(text, rails);
            }
            
            // --- CONSOLE ANIMATION PHASE ---
            encryptBtn.disabled = true; decryptBtn.disabled = true;
            outputBox.value = "Executing encryption algorithm...";
            
            const consoleDiv = document.getElementById('stepConsole');
            consoleDiv.innerHTML = `<div><span class="prompt">➜</span> <span class="highlight">INITIALIZING ${method.toUpperCase()} ALGORITHM</span>...</div>`;

            // Adjust speed dynamically based on output length
            const speed = resultObj.steps.length > 20 ? 150 : 400; 

            for (let i = 0; i < resultObj.steps.length; i++) {
                await delay(speed);
                const stepLine = document.createElement('div');
                stepLine.innerHTML = `<span class="prompt">➜</span> ${resultObj.steps[i]}`;
                consoleDiv.appendChild(stepLine);
                consoleDiv.scrollTop = consoleDiv.scrollHeight;
            }

            await delay(400);
            const completeLine = document.createElement('div');
            completeLine.innerHTML = `<br><span class="prompt">➜</span> <span class="success">Encryption / Decryption process complete.</span>`;
            consoleDiv.appendChild(completeLine);
            consoleDiv.scrollTop = consoleDiv.scrollHeight;

            outputBox.value = resultObj.output;
            encryptBtn.disabled = false; decryptBtn.disabled = false;
            
        } catch (err) {
            errorMsg.innerText = err.message;
            errorMsg.style.display = 'block';
        }
    }

    function copyToClipboard() {
        const output = document.getElementById('outputText');
        output.select();
        document.execCommand("copy");
        alert("Result copied to clipboard!");
    }

    // ==========================================
    // ALGORITHMS (PRESERVE NON-LETTERS)
    // ==========================================

    function additiveCipher(text, shift, isDecrypt) {
        let actualShift = isDecrypt ? (26 - (shift % 26)) % 26 : ((shift % 26) + 26) % 26;
        let output = '';
        let steps = [`<span class="badge">ADDITIVE</span> Mode: ${isDecrypt ? 'Decrypt' : 'Encrypt'} | Shift: ${shift}`];
        
        for (let i = 0; i < text.length; i++) {
            let ch = text[i];
            if (/[A-Za-z]/.test(ch)) {
                let upper = ch.toUpperCase();
                let pCode = upper.charCodeAt(0) - 65;
                let cCode = (pCode + actualShift) % 26;
                let newChar = String.fromCharCode(cCode + 65);
                // Preserve original case? We output uppercase as per typical ciphers.
                output += newChar;
                steps.push(`Letter '${upper}' (${pCode}) + ${actualShift} = ${cCode} → '<span class="success">${newChar}</span>'`);
            } else {
                output += ch;
                steps.push(`Preserved non‑letter: '<span class="highlight">${ch}</span>' (unchanged)`);
            }
        }
        return { output, steps };
    }

    function simpleCipher(text, keyword, isDecrypt) {
        let steps = [`<span class="badge">SIMPLE</span> Mode: ${isDecrypt ? 'Decrypt' : 'Encrypt'} | Key: ${keyword}`];
        
        let uniqueKey = Array.from(new Set(keyword.split(''))).join('');
        let standardAlpha = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
        let remainingLetters = standardAlpha.split('').filter(char => !uniqueKey.includes(char)).join('');
        let cipherAlpha = uniqueKey + remainingLetters;
        
        steps.push(`Base Matrix: &nbsp;${standardAlpha}`);
        steps.push(`Cipher Matrix: <span class="success">${cipherAlpha}</span>`);
        
        let output = '';
        for (let i = 0; i < text.length; i++) {
            let ch = text[i];
            if (/[A-Za-z]/.test(ch)) {
                let upper = ch.toUpperCase();
                if (isDecrypt) {
                    let index = cipherAlpha.indexOf(upper);
                    let newChar = standardAlpha[index];
                    output += newChar;
                    steps.push(`Decode: '${upper}' → '<span class="success">${newChar}</span>'`);
                } else {
                    let index = standardAlpha.indexOf(upper);
                    let newChar = cipherAlpha[index];
                    output += newChar;
                    steps.push(`Encode: '${upper}' → '<span class="success">${newChar}</span>'`);
                }
            } else {
                output += ch;
                steps.push(`Preserved non‑letter: '<span class="highlight">${ch}</span>' (unchanged)`);
            }
        }
        return { output, steps };
    }

    function vigenereCipher(text, key, isDecrypt) {
        let output = '';
        let steps = [`<span class="badge">VIGENÈRE</span> Mode: ${isDecrypt ? 'Decrypt' : 'Encrypt'} | Key: ${key}`];
        let keyIndex = 0;
        
        for (let i = 0; i < text.length; i++) {
            let ch = text[i];
            if (/[A-Za-z]/.test(ch)) {
                let upper = ch.toUpperCase();
                let pCode = upper.charCodeAt(0) - 65;
                let kChar = key.charAt(keyIndex % key.length);
                let kCode = kChar.charCodeAt(0) - 65;
                let cCode;
                if (isDecrypt) {
                    cCode = (pCode - kCode + 26) % 26;
                    steps.push(`'${upper}' [${pCode}] - Key '${kChar}' [${kCode}] = ${cCode} → '<span class="success">${String.fromCharCode(cCode + 65)}</span>'`);
                } else {
                    cCode = (pCode + kCode) % 26;
                    steps.push(`'${upper}' [${pCode}] + Key '${kChar}' [${kCode}] = ${cCode} → '<span class="success">${String.fromCharCode(cCode + 65)}</span>'`);
                }
                output += String.fromCharCode(cCode + 65);
                keyIndex++;
            } else {
                output += ch;
                steps.push(`Preserved non‑letter: '<span class="highlight">${ch}</span>' (unchanged)`);
            }
        }
        return { output, steps };
    }

    function railFenceEncrypt(text, rails) {
        // For rail fence, we need to handle non-letters as part of the pattern
        let fence = Array.from({ length: rails }, () => []);
        let row = 0, direction = 1;
        let steps = [`<span class="badge">RAIL FENCE</span> Mode: Encrypt | Rows: ${rails}`];
        
        for (let i = 0; i < text.length; i++) {
            let ch = text[i];
            fence[row].push(ch);
            steps.push(`Placing character '<span class="highlight">${ch}</span>' into Row ${row + 1}`);
            row += direction;
            if (row === rails - 1 || row === 0) direction *= -1;
        }
        
        steps.push(`Generating final ciphertext by reading rows sequentially...`);
        let output = fence.map(r => r.join('')).join('');
        return { output, steps };
    }

    function railFenceDecrypt(text, rails) {
        let fence = Array.from({ length: rails }, () => Array(text.length).fill('.'));
        let row = 0, direction = 1;
        let steps = [`<span class="badge">RAIL FENCE</span> Mode: Decrypt | Rows: ${rails}`];
        
        for (let i = 0; i < text.length; i++) {
            fence[row][i] = '*';
            row += direction;
            if (row === rails - 1 || row === 0) direction *= -1;
        }
        
        steps.push(`Building position markers in matrix...`);
        let index = 0;
        for (let r = 0; r < rails; r++) {
            for (let c = 0; c < text.length; c++) {
                if (fence[r][c] === '*' && index < text.length) {
                    fence[r][c] = text[index++];
                }
            }
        }
        
        steps.push(`Reconstructing original by zig‑zag reading...`);
        let output = '';
        row = 0; direction = 1;
        for (let i = 0; i < text.length; i++) {
            output += fence[row][i];
            row += direction;
            if (row === rails - 1 || row === 0) direction *= -1;
        }
        return { output, steps };
    }
</script>
</body>
</html>
